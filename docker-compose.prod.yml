version: "3.9"

services:
  # ---- Reverse Proxy ----
  nginx:
    image: nginx:alpine
    container_name: nexus-nginx
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
    restart: unless-stopped

  # ---- Database ----
  mongodb:
    image: mongo:7.0
    container_name: nexus-mongodb
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval \"db.adminCommand('ping').ok\" | grep 1 >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---- Backend Microservices ----
  guardian-net:
    build:
      context: .
      dockerfile: Dockerfile.workspace
      args:
        WORKSPACE_NAME: "@nexus-civic/guardian-net"
    env_file: .env.production
    environment:
      - PORT=3001
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped

  pulse-report:
    build:
      context: .
      dockerfile: Dockerfile.workspace
      args:
        WORKSPACE_NAME: "@nexus-civic/pulse-report"
    env_file: .env.production
    environment:
      - PORT=3002
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped

  civic-pulse:
    build:
      context: .
      dockerfile: Dockerfile.workspace
      args:
        WORKSPACE_NAME: "@nexus-civic/civic-pulse"
    env_file: .env.production
    environment:
      - PORT=3003
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped

  ledger-civic:
    build:
      context: .
      dockerfile: Dockerfile.workspace
      args:
        WORKSPACE_NAME: "@nexus-civic/ledger-civic"
    env_file: .env.production
    environment:
      - PORT=3009
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped

  mesh-alert:
    build:
      context: .
      dockerfile: Dockerfile.workspace
      args:
        WORKSPACE_NAME: "@nexus-civic/mesh-alert"
    env_file: .env.production
    environment:
      - PORT=3010
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped

  sentinel-ai:
    build:
      context: .
      dockerfile: Dockerfile.workspace
      args:
        WORKSPACE_NAME: "@nexus-civic/sentinel-ai"
    env_file: .env.production
    environment:
      - PORT=3007
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped

  voice-assembly:
    build:
      context: .
      dockerfile: Dockerfile.workspace
      args:
        WORKSPACE_NAME: "voice-assembly"
    env_file: .env.production
    environment:
      - PORT=3008
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped

  aura-assist:
    build:
      context: .
      dockerfile: Dockerfile.workspace
      args:
        WORKSPACE_NAME: "@nexus-civic/aura-assist"
    env_file: .env.production
    environment:
      - PORT=3011
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped

  # ---- Frontend ----
  web:
    build:
      context: .
      dockerfile: Dockerfile.workspace
      args:
        WORKSPACE_NAME: "@nexus-civic/web"
    env_file: .env.production
    environment:
      - PORT=3000
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mongodb_data:
